<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育成ゲーム 完全版</title>
<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #b2fefa, #0ed2f7);
        color: #333;
    }

    /* タイトルは非表示にする */
    h1 {
        display: none;
    }

    #pet {
        font-size: 90px;
        margin: 20px auto;
        transition: 0.3s;
        animation: bounce 1.3s infinite ease-in-out;
    }
    @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    .status-box {
        width: 280px;
        margin: 0 auto;
        padding: 15px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        text-align: left;
        font-size: 1em;
    }
    .bar {
        height: 12px;
        background: #ddd;
        border-radius: 10px;
        margin-bottom: 12px;
    }
    .bar-inner {
        height: 100%;
        background: #4caf50;
        border-radius: 10px;
        transition: width 0.3s;
    }

    button {
        margin: 10px;
        padding: 10px 28px;
        font-size: 1em;
        border: none;
        border-radius: 10px;
        background: #ffdd57;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        transition: 0.2s;
    }
    button:active { transform: scale(0.93); }

    #message {
        margin-top: 15px;
        font-weight: bold;
        font-size: 1.2em;
        height: 1.2em;
    }

    #gameArea {
        display: none;
        margin-top: 20px;
        font-size: 1.3em;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<!-- タイトル削除済み -->
<h1>（非表示）</h1>

<div id="pet">🥚</div>

<div id="stageText">ステージ：たまご</div>

<div class="status-box">
    <div>おなか</div>
    <div class="bar"><div id="hungerBar" class="bar-inner"></div></div>

    <div>げんき</div>
    <div class="bar"><div id="energyBar" class="bar-inner"></div></div>

    <div>きれいさ</div>
    <div class="bar"><div id="cleanBar" class="bar-inner"></div></div>
</div>

<button onclick="feed()">🍙 ごはん</button>
<button onclick="play()">🎮 あそぶ</button>
<button onclick="cleanPet()">🧼 おそうじ</button>
<button onclick="saveGame()">💾 セーブ</button>
<button onclick="loadGame()">📂 ロード</button>

<div id="message"></div>

<div id="gameArea">
    <div>ミニゲーム：タップしてポイントゲット！</div>
    <button onclick="hit()">タップ！</button>
    <div id="score">スコア：0</div>
    <button onclick="endGame()">終了する</button>
</div>

<script>
let hunger = 100;
let energy = 100;
let cleanVal = 100;

let stage = 0;
let evolution = 0;

const hungerBar = document.getElementById("hungerBar");
const energyBar = document.getElementById("energyBar");
const cleanBar  = document.getElementById("cleanBar");
const message   = document.getElementById("message");
const pet       = document.getElementById("pet");
const stageText = document.getElementById("stageText");

function getFace() {
    if (stage === 0) return "🥚";
    if (hunger < 30) return "😞";
    if (energy < 30) return "🥱";
    if (cleanVal < 30) return "🤢";

    if (stage === 3) {
        if (evolution === 1) return "🐲";
        if (evolution === 2) return "🐱";
        if (evolution === 3) return "🦊";
    }
    return "😊";
}

function updateBars() {
    hungerBar.style.width = hunger + "%";
    energyBar.style.width = energy + "%";
    cleanBar.style.width  = cleanVal + "%";
    pet.textContent = getFace();
}

function checkEvolution() {
    if (stage === 0 && hunger > 50) {
        stage = 1;
        stageText.textContent = "ステージ：幼年期";
        pet.textContent = "🐤";
    } else if (stage === 1 && hunger > 60 && energy > 60) {
        stage = 2;
        stageText.textContent = "ステージ：成長期";
        pet.textContent = "🐥";
    } else if (stage === 2 && hunger > 70 && energy > 70 && cleanVal > 70) {
        stage = 3;
        if (hunger > energy)      evolution = 1;
        else if (energy > 90)    evolution = 2;
        else                     evolution = 3;
        stageText.textContent = "ステージ：成熟期（進化！）";
    }
}

function feed() {
    hunger = Math.min(100, hunger + 20);
    message.textContent = "おいしそう！";
    updateBars();
}
function play() {
    energy = Math.min(100, energy + 20);
    message.textContent = "たのしい！";
    showMiniGame();
    updateBars();
}
function cleanPet() {
    cleanVal = Math.min(100, cleanVal + 25);
    message.textContent = "ピカピカ！";
    updateBars();
}

setInterval(() => {
    hunger = Math.max(0, hunger - 1);
    energy = Math.max(0, energy - 1);
    cleanVal = Math.max(0, cleanVal - 1);
    checkEvolution();
    updateBars();
}, 1500);

setInterval(() => {
    const r = Math.random();
    if (r < 0.2) {
        hunger = Math.min(100, hunger + 10);
        message.textContent = "✨ラッキー！おなか+10";
    } else if (r < 0.3) {
        energy = Math.min(100, energy + 10);
        message.textContent = "🍀元気+10";
    }
    updateBars();
}, 10000);

let score = 0;

function showMiniGame() {
    document.getElementById("gameArea").style.display = "block";
    score = 0;
    document.getElementById("score").textContent = "スコア：0";
}
function hit() {
    score++;
    document.getElementById("score").textContent = "スコア：" + score;
}
function endGame() {
    document.getElementById("gameArea").style.display = "none";
    energy = Math.min(100, energy + score);
    message.textContent = "ごほうび！げんき +" + score;
    updateBars();
}

function saveGame() {
    localStorage.setItem("gdata", JSON.stringify({
        hunger, energy, cleanVal, stage, evolution
    }));
    message.textContent = "セーブ完了！";
}
function loadGame() {
    const data = JSON.parse(localStorage.getItem("gdata"));
    if (!data) {
        message.textContent = "データなし";
        return;
    }
    hunger = data.hunger;
    energy = data.energy;
    cleanVal = data.cleanVal;
    stage = data.stage;
    evolution = data.evolution;

    stageText.textContent =
        ["たまご", "幼年期", "成長期", "成熟期"][stage];

    message.textContent = "ロード完了！";
    updateBars();
}

updateBars();
</script>

</body>
</html>
