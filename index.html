<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育成ゲーム</title>
<style>
    body {
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #b2fefa, #0ed2f7);
        color: #333;
    }
    h1 {
        font-size: 2.2em;
        margin-bottom: 10px;
    }
    #pet {
        font-size: 80px;
        margin: 20px auto;
        animation: bounce 1.3s infinite ease-in-out;
    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }
    .status-box {
        width: 260px;
        margin: 0 auto;
        padding: 15px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        text-align: left;
        font-size: 1.1em;
    }
    .bar {
        height: 12px;
        background: #ddd;
        border-radius: 10px;
        margin-bottom: 10px;
    }
    .bar-inner {
        height: 100%;
        background: #4caf50;
        border-radius: 10px;
        transition: width 0.3s;
    }
    button {
        margin: 12px;
        padding: 12px 30px;
        font-size: 1em;
        border: none;
        border-radius: 10px;
        background: #ffdd57;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        transition: 0.2s;
    }
    button:active {
        transform: scale(0.93);
    }
    #message {
        margin-top: 15px;
        font-weight: bold;
        font-size: 1.2em;
        height: 1.2em;
    }
</style>
</head>
<body>

<h1>育成ゲーム</h1>

<div id="pet">🐥</div>

<div class="status-box">
    <div>おなか</div>
    <div class="bar"><div id="hungerBar" class="bar-inner" style="width:100%"></div></div>

    <div>げんき</div>
    <div class="bar"><div id="energyBar" class="bar-inner" style="width:100%"></div></div>

    <div>きれいさ</div>
    <div class="bar"><div id="cleanBar" class="bar-inner" style="width:100%"></div></div>
</div>

<button onclick="feed()">ごはん</button>
<button onclick="play()">あそぶ</button>
<button onclick="clean()">おそうじ</button>

<div id="message"></div>

<script>
    let hunger = 100;
    let energy = 100;
    let cleanVal = 100;

    const hungerBar = document.getElementById("hungerBar");
    const energyBar = document.getElementById("energyBar");
    const cleanBar  = document.getElementById("cleanBar");
    const message   = document.getElementById("message");
    const pet       = document.getElementById("pet");

    function updateBars() {
        hungerBar.style.width = hunger + "%";
        energyBar.style.width = energy + "%";
        cleanBar.style.width  = cleanVal + "%";

        if (hunger <= 0 || energy <= 0 || cleanVal <= 0) {
            pet.textContent = "💤";
            message.textContent = "ぐったりしてしまった…";
        }
    }

    function feed() {
        hunger = Math.min(100, hunger + 20);
        message.textContent = "もぐもぐ！";
        updateBars();
    }
    function play() {
        energy = Math.min(100, energy + 20);
        message.textContent = "たのしい！";
        updateBars();
    }
    function clean() {
        cleanVal = Math.min(100, cleanVal + 25);
        message.textContent = "ピカピカ！";
        updateBars();
    }

    // 時間経過で減らす
    setInterval(() => {
        hunger = Math.max(0, hunger - 1);
        energy = Math.max(0, energy - 1);
        cleanVal = Math.max(0, cleanVal - 1);
        updateBars();
    }, 1500);

    updateBars();
</script>

</body>
</html>
